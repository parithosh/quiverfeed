# Release workflow: builds quiverfeed and publishes to PyPI on tag push.
#
# Triggered by pushing a tag `v<MAJOR>.<MINOR>.<PATCH>` (e.g. v0.1.0). The tag
# must match the version declared in src/quiverfeed/_version.py — a mismatch
# fails the build before anything is published.
#
# Authentication uses PyPI Trusted Publishing (OIDC). No API token is stored
# in the repo or in GitHub secrets. PyPI side requires a publisher pointing
# at this exact workflow file and the `pypi` environment.
#
# Release notes / GitHub Release object are managed manually via the
# "Draft new release" UI. That action creates the tag, which fires this
# workflow. The CI does not touch the GitHub Release object itself —
# install via `pip install quiverfeed`, not by downloading artifacts from
# the release page.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import re,sys; t=open('src/quiverfeed/_version.py').read(); print(re.search(r'\"([^\"]+)\"', t).group(1))")
          echo "tag=$TAG pkg=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  test:
    name: Smoke-test wheel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install built wheel and run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl pytest
          # tests/ imports `quiverfeed` — with src/ layout, only the installed
          # wheel is on the import path.
          python -m pytest tests/ -q

      - name: Smoke-test the CLI entry point
        run: |
          quiverfeed --version
          quiverfeed datasets

  publish:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/quiverfeed
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
